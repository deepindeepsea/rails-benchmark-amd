version: '3.8'

services:
  rails-benchmark:
    build: .
    ports:
      - "3000:3000"
    environment:
      - RAILS_ENV=production
      - SECRET_KEY_BASE=your_secret_key_base_here
      - RAILS_SERVE_STATIC_FILES=true
      - RAILS_LOG_TO_STDOUT=true
      - WEB_CONCURRENCY=4
      - RAILS_MAX_THREADS=8
    volumes:
      - ./log:/app/log
      - benchmark_results:/app/benchmark-results
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - rails-benchmark
    restart: unless-stopped

volumes:
  benchmark_results: